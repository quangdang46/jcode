#:schema https://dystroy.org/bacon/.bacon.schema.json
#
# bacon configuration for jcode
# https://dystroy.org/bacon
#
# Quick start:
#   bacon                # default job: cargo check (whole workspace)
#   bacon clippy         # cargo clippy --all-targets --all-features (matches CI)
#   bacon test           # cargo test --lib
#   bacon test-jcode     # focused test of just the jcode crate (faster)
#   bacon ci             # mirror CI gates: fmt + clippy + warning budget
#
# Press 'q' to quit, 'r' to refresh, '?' for keybind help.
# Inside the TUI:
#   c → check       k → clippy     t → test-jcode    T → test (full)
#   i → ci          f → fmt        d → doc

default_job = "check"

env.CARGO_TERM_COLOR = "always"

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false
watch = ["src", "crates", "Cargo.toml", "Cargo.lock"]

[jobs.check-all]
command = ["cargo", "check", "--all-targets", "--all-features", "--color", "always"]
need_stdout = false
watch = ["src", "crates", "Cargo.toml", "Cargo.lock"]

[jobs.clippy]
command = [
    "cargo", "clippy",
    "--all-targets", "--all-features",
    "--color", "always",
    "--", "-D", "warnings",
]
need_stdout = false
watch = ["src", "crates", "Cargo.toml", "Cargo.lock"]

[jobs.test]
command = [
    "cargo", "test",
    "--color", "always",
    "--", "--color", "always", "--show-output",
]
need_stdout = true
watch = ["src", "crates", "Cargo.toml", "Cargo.lock"]

# Faster iteration: only the top-level jcode crate's lib tests.
[jobs.test-jcode]
command = [
    "cargo", "test", "-p", "jcode", "--lib",
    "--color", "always",
    "--", "--color", "always", "--show-output",
]
need_stdout = true
watch = ["src", "Cargo.toml"]

# Run a specific test by name. Invoke as: bacon test-name -- my_test
[jobs.test-name]
command = [
    "cargo", "test",
    "--color", "always",
    "--", "--color", "always", "--show-output", "--exact",
]
need_stdout = true
watch = ["src", "crates", "Cargo.toml"]

# Mirror the CI gates locally so the same red/green you'd see in PR
# checks shows up in your terminal as you edit.
[jobs.ci]
command = [
    "bash",
    "-c",
    "cargo fmt --all -- --check && cargo check --all-targets --all-features --color always && cargo clippy --all-targets --all-features --color always -- -D warnings && scripts/check_warning_budget.sh",
]
need_stdout = true
watch = ["src", "crates", "Cargo.toml", "Cargo.lock", "scripts"]

[jobs.fmt]
command = ["cargo", "fmt", "--all", "--", "--check", "--color", "always"]
need_stdout = false
watch = ["src", "crates"]

[jobs.doc]
command = [
    "cargo", "doc",
    "--no-deps", "--all-features",
    "--color", "always",
]
need_stdout = false
watch = ["src", "crates", "Cargo.toml"]

[jobs.run]
command = [
    "cargo", "run", "--release", "--bin", "jcode",
    "--color", "always",
]
need_stdout = true
allow_warnings = true
watch = ["src", "crates", "Cargo.toml"]

# ---- Keybindings inside the TUI to switch jobs without restart ----
[keybindings]
a = "job:check-all"
c = "job:check"
k = "job:clippy"
t = "job:test-jcode"
T = "job:test"
i = "job:ci"
f = "job:fmt"
d = "job:doc"
